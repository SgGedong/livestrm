name: Update Events Playlist

on:
  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch: 
  # Runs automatically every 20 minutes
  schedule:
    - cron: '*/30 * * * *'    

# Give the action permission to commit files back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - run: echo "Cron job is running"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install -r req/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    - name: Install Playwright Browsers & OS Dependencies
      run: playwright install chromium --with-deps

    - name: Run Scraper Script
      run: python src/update_buff.py

    - name: Commit and Push Playlist
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add live_tv_channels.m3u
        git add liveevents.m3u
        git add roxie_streams.json roxie_streams.m3u8
        
        # Check if there are actually changes to commit to avoid empty commit errors
        if git diff-index --quiet HEAD --; then
          echo "No changes to playlist, skipping commit."
        else
          git commit -m "buff.m3u"
                
        git push
          
          # Pull remote changes and rebase BEFORE pushing to prevent rejection errors
          git pull --rebase origin main
          git push origin main
